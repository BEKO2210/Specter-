# ABSICHTLICH VERWUNDBAR - Test-Fixture (Mustermann GmbH Reverse Proxy).
server {
    listen 443 ssl;
    server_name shop.mustermann-gmbh.de;

    # Unsichere Transportkonfiguration
    ssl_protocols TLSv1.0 SSLv3;
    proxy_ssl_verify off;

    location / {
        proxy_pass http://127.0.0.1:80;
    }
}
